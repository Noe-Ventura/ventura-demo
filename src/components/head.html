<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>{{title}}</title>
  <meta name="description" content="{{description}}" />
  
  <!-- Favicons for Light/Dark Mode -->
  <link rel="icon" type="image/png" href="%BASE_URL%assets/VENTURA_PACKAGE_LOGO_2024/Rond_seul_bleu.png" media="(prefers-color-scheme: light)" />
  <link rel="icon" type="image/png" href="%BASE_URL%assets/VENTURA_PACKAGE_LOGO_2024/Rond_seul_blanc.png" media="(prefers-color-scheme: dark)" />

  <!-- Preconnect for Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Combined Google Fonts Request -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="%BASE_URL%src/index.css" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://ventura-mecanics.ch{{canonicalPath}}" />
  <meta property="og:title" content="{{title}}" />
  <meta property="og:description" content="{{description}}" />
  <meta property="og:image" content="https://ventura-mecanics.ch/assets/VENTURA_PACKAGE_LOGO_2024/horizontal_rond_ventura_bleu.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://ventura-mecanics.ch{{canonicalPath}}" />
  <meta property="twitter:title" content="{{title}}" />
  <meta property="twitter:description" content="{{description}}" />
  <meta property="twitter:image" content="https://ventura-mecanics.ch/assets/VENTURA_PACKAGE_LOGO_2024/horizontal_rond_ventura_bleu.png" />
  
  <!-- Canonical Link -->
  <link rel="canonical" href="https://ventura-mecanics.ch{{canonicalPath}}" />

  <!-- Structured Data / JSON-LD -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Ventura Mecanics SA",
      "url": "https://ventura-mecanics.ch/",
      "logo": "https://ventura-mecanics.ch/assets/VENTURA_PACKAGE_LOGO_2024/horizontal_rond_ventura_bleu.png",
      "description": "Global Leaders in Escomatic® Solutions with Over 40 Years of Excellence. Spare parts, Repairs and Smart turning solutions.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Switzerland"
      }
    }
  </script>
</head>
